name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm install
      - run: npm run test
      - run: npm run build:client
      - uses: actions/upload-artifact@v4
        with:
          name: auth-sync-dist
          path: packages/client/dist/
